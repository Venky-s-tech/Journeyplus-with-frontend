# ==========================================
# Server Configuration
# ==========================================
server.port=8091

spring.application.name=journeyplus-backend


app.rsa.private-key-path=classpath:keys/private.pem
app.rsa.public-key-path=classpath:keys/public.pem

# ==========================================
# MySQL Database Connection (HikariCP)
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/test_journeyplus?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari Connection Pool Settings (Target: max 50 concurrent connections per node)
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# ==========================================
# JPA / Hibernate Settings
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# Security & JWT Properties
# ==========================================
# JWT Expirations: Access Token (15 mins = 900,000 ms), Refresh Token (7 days = 604,800,000 ms)
app.jwt.access-expiration-ms=900000
app.jwt.refresh-expiration-ms=604800000
# Fallback secret for AES-256 amount encryption (Must be a 32-character string for AES-256)
app.encryption.secret-key=JourneyPlusSuperSecretKey32Bytes!

# ==========================================
# Observability (Actuator + Micrometer)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true

# ==========================================
# Logging
# ==========================================
logging.level.com.journeyplus=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=journeyplus.log

